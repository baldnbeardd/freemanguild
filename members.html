<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Area — Freeman Guild</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f2f2f2;
    --muted: #8a8a8a;
    --line: #2a2a2a;
    --accent: #4a9eff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 40px;
    border-bottom: 1px solid var(--line);
  }
  .logo {
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 14px;
  }
  header nav a {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    color: var(--muted);
    margin-left: 24px;
  }
  header nav a:hover { color: var(--fg); }

  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  h1 {
    text-transform: uppercase;
    letter-spacing: 4px;
    font-size: 22px;
    font-weight: 300;
    margin-bottom: 40px;
    text-align: center;
  }

  .label {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 11px;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
  }

  input[type=email], input[type=password], input[type=text], input[type=tel] {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--fg);
    padding: 12px 14px;
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 20px;
  }
  input:focus { outline: none; border-color: var(--fg); }

  button, .btn {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid var(--fg);
    color: var(--fg);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    padding: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s, color 0.2s;
    margin-bottom: 12px;
  }
  button:hover, .btn:hover { background: var(--fg); color: var(--bg); }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .divider {
    display: flex;
    align-items: center;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin: 28px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }
  .divider::before { margin-right: 12px; }
  .divider::after { margin-left: 12px; }

  .toggle-link {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  .toggle-link span { color: var(--fg); cursor: pointer; border-bottom: 1px solid var(--fg); }

  .genres {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    margin-bottom: 28px;
  }
  .genre-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  .genre-item input { width: auto; margin: 0; }

  .section-title {
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    color: var(--muted);
    border-bottom: 1px solid var(--line);
    padding-bottom: 10px;
    margin: 36px 0 20px;
  }

  .status-msg {
    text-align: center;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--accent);
    min-height: 16px;
    margin-bottom: 16px;
  }
  .status-msg.error { color: #ff5a5a; }

  .danger {
    border-color: #7a2a2a;
    color: #ff8a8a;
  }
  .danger:hover { background: #7a2a2a; color: var(--fg); }

  .membership-badge {
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 10px;
    margin-bottom: 24px;
  }

  .hidden { display: none; }
  .loading { text-align: center; color: var(--muted); padding: 60px 0; letter-spacing: 2px; text-transform: uppercase; font-size: 12px; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Freeman Guild</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="merch.html">Merch</a>
  </nav>
</header>

<main>

  <div id="loadingView" class="loading">Loading…</div>

  <!-- ===================== LOGGED OUT VIEW ===================== -->
  <div id="authView" class="hidden">
    <h1>Member Login</h1>

    <button class="btn btn-google" id="googleBtn">Continue with Google</button>

    <div class="divider">or</div>

    <div id="statusMsg" class="status-msg"></div>

    <label class="label" for="authEmail">Email</label>
    <input type="email" id="authEmail" placeholder="you@example.com">

    <label class="label" for="authPassword">Password</label>
    <input type="password" id="authPassword" placeholder="••••••••">

    <button id="primaryAuthBtn">Sign In</button>

    <div class="toggle-link">
      <span id="toggleModeText">Don't have an account? <span id="toggleModeLink">Sign up</span></span>
    </div>
  </div>

  <!-- ===================== LOGGED IN VIEW ===================== -->
  <div id="dashboardView" class="hidden">
    <h1>Member Dashboard</h1>

    <div class="membership-badge" id="membershipBadge">Membership: Inactive</div>

    <div id="saveStatus" class="status-msg"></div>

    <div class="section-title">Contact Info</div>

    <label class="label" for="fName">Name</label>
    <input type="text" id="fName">

    <label class="label" for="fEmail">Email</label>
    <input type="email" id="fEmail" disabled>

    <label class="label" for="fPhone">Phone</label>
    <input type="tel" id="fPhone">

    <label class="label" for="fFacebook">Facebook Profile (optional)</label>
    <input type="text" id="fFacebook">

    <div class="section-title">Favorite Genres</div>
    <div class="genres" id="genreGrid"></div>

    <button id="saveBtn">Save Changes</button>

    <div class="section-title">Membership</div>
    <p style="font-size:13px; color:var(--muted); line-height:1.6;">Annual membership purchasing is coming soon.</p>

    <div class="section-title">Account</div>
    <button id="signOutBtn">Sign Out</button>
    <button id="unsubscribeBtn" class="danger">Unsubscribe from Communications</button>
  </div>

</main>

<script>
  // ====== CONFIGURE THESE TWO VALUES ======
  const SUPABASE_URL = 'https://psigpaxopesgwnnjoxvc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_czFc4uRTQu2Ego2_tjoygQ_lhq6bNCo';
  // =========================================

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const GENRES = [
    'Rock', 'Hip-Hop', 'Jazz', 'Electronic',
    'R&B', 'Country', 'Pop', 'Classical',
    'Reggae', 'Metal', 'Folk', 'Latin'
  ];

  let isSignUp = false;

  const loadingView = document.getElementById('loadingView');
  const authView = document.getElementById('authView');
  const dashboardView = document.getElementById('dashboardView');
  const statusMsg = document.getElementById('statusMsg');
  const saveStatus = document.getElementById('saveStatus');

  // Build genre checkboxes
  const genreGrid = document.getElementById('genreGrid');
  GENRES.forEach(g => {
    const id = 'genre_' + g.replace(/[^a-z0-9]/gi, '');
    const wrap = document.createElement('label');
    wrap.className = 'genre-item';
    wrap.innerHTML = `<input type="checkbox" id="${id}" value="${g}"> ${g}`;
    genreGrid.appendChild(wrap);
  });

  function showStatus(el, text, isError = false) {
    el.textContent = text;
    el.className = 'status-msg' + (isError ? ' error' : '');
    if (text) setTimeout(() => { el.textContent = ''; }, 4000);
  }

  async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    loadingView.classList.add('hidden');
    if (session) {
      await loadDashboard(session.user);
    } else {
      authView.classList.remove('hidden');
    }
  }

  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      authView.classList.add('hidden');
      loadDashboard(session.user);
    } else if (event === 'SIGNED_OUT') {
      dashboardView.classList.add('hidden');
      authView.classList.remove('hidden');
    }
  });

  // ---- Google sign-in ----
  document.getElementById('googleBtn').addEventListener('click', async () => {
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  });

  // ---- Email/password toggle ----
  const primaryAuthBtn = document.getElementById('primaryAuthBtn');

  function handleToggleClick() {
    isSignUp = !isSignUp;
    primaryAuthBtn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
    document.getElementById('toggleModeText').innerHTML = isSignUp
      ? `Already have an account? <span id="toggleModeLink">Sign in</span>`
      : `Don't have an account? <span id="toggleModeLink">Sign up</span>`;
    document.getElementById('toggleModeLink').addEventListener('click', handleToggleClick);
  }
  document.getElementById('toggleModeLink').addEventListener('click', handleToggleClick);

  primaryAuthBtn.addEventListener('click', async () => {
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if (!email || !password) {
      showStatus(statusMsg, 'Enter both email and password.', true);
      return;
    }
    if (isSignUp) {
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) showStatus(statusMsg, error.message, true);
      else showStatus(statusMsg, 'Check your email to confirm your account.');
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) showStatus(statusMsg, error.message, true);
    }
  });

  // ---- Dashboard ----
  async function loadDashboard(user) {
    dashboardView.classList.remove('hidden');

    let { data: profile, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();

    if (error || !profile) {
      // fallback in case the trigger hasn't created it yet
      profile = { email: user.email, name: '', phone: '', facebook: '', genres: [], unsubscribed: false, membership_status: 'inactive' };
    }

    document.getElementById('fName').value = profile.name || '';
    document.getElementById('fEmail').value = profile.email || user.email;
    document.getElementById('fPhone').value = profile.phone || '';
    document.getElementById('fFacebook').value = profile.facebook || '';

    (profile.genres || []).forEach(g => {
      const id = 'genre_' + g.replace(/[^a-z0-9]/gi, '');
      const cb = document.getElementById(id);
      if (cb) cb.checked = true;
    });

    const badge = document.getElementById('membershipBadge');
    badge.textContent = 'Membership: ' + (profile.membership_status || 'inactive').toUpperCase();

    document.getElementById('unsubscribeBtn').textContent =
      profile.unsubscribed ? 'Resubscribe to Communications' : 'Unsubscribe from Communications';
  }

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return;

    const selectedGenres = GENRES.filter(g => {
      const id = 'genre_' + g.replace(/[^a-z0-9]/gi, '');
      return document.getElementById(id).checked;
    });

    const { error } = await supabase.from('profiles').update({
      name: document.getElementById('fName').value.trim(),
      phone: document.getElementById('fPhone').value.trim(),
      facebook: document.getElementById('fFacebook').value.trim(),
      genres: selectedGenres
    }).eq('id', session.user.id);

    if (error) showStatus(saveStatus, error.message, true);
    else showStatus(saveStatus, 'Saved.');
  });

  document.getElementById('unsubscribeBtn').addEventListener('click', async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return;

    const { data: current } = await supabase.from('profiles').select('unsubscribed').eq('id', session.user.id).single();
    const newVal = !(current && current.unsubscribed);

    const { error } = await supabase.from('profiles').update({ unsubscribed: newVal }).eq('id', session.user.id);
    if (error) {
      showStatus(saveStatus, error.message, true);
    } else {
      document.getElementById('unsubscribeBtn').textContent = newVal ? 'Resubscribe to Communications' : 'Unsubscribe from Communications';
      showStatus(saveStatus, newVal ? 'You have been unsubscribed.' : 'You have been resubscribed.');
    }
  });

  document.getElementById('signOutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
  });

  init();
</script>

</body>
</html>
